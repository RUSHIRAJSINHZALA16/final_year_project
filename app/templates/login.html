{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-cover bg-center" style="background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.8)), url('https://assets.nflxext.com/ffe/siteui/vlv3/a73c4363-1dcd-4719-b3b1-3725418fd91d/fe1147dd-78be-44aa-a0e5-2d2994305a13/IN-en-20231016-popsignuptwoweeks-perspective_alpha_website_large.jpg');">
    <div class="bg-black/75 p-16 rounded-md w-full max-w-md z-10 mt-16">
        <h2 class="text-3xl font-bold mb-8 text-white">Sign In</h2>
        
        <form action="{{ url_for('auth.register') if is_register else url_for('auth.login') }}" method="POST" class="flex flex-col gap-4">
            <div>
                <input type="text" name="username" placeholder="Username" required
                    class="w-full bg-[#333] text-white px-4 py-3.5 rounded focus:outline-none focus:ring-2 focus:ring-red-600 transition">
            </div>
            
            <div>
                <input type="password" name="password" placeholder="Password" required
                    class="w-full bg-[#333] text-white px-4 py-3.5 rounded focus:outline-none focus:ring-2 focus:ring-red-600 transition">
            </div>
            
            <button type="submit" class="bg-red-600 text-white font-bold py-3.5 rounded mt-6 hover:bg-red-700 transition">
                Sign In
            </button>
            <div class="flex justify-between text-gray-400 text-xs mt-2">
                <label class="flex items-center gap-1 cursor-pointer">
                    <input type="checkbox" name="remember" class="accent-gray-500 bg-[#333] border-0 rounded cursor-pointer">
                    Remember me
                </label>
                <a href="#" class="hover:underline">Need help?</a>
            </div>
        </form>
        
        <div class="mt-16 text-gray-500">
            <p>New to Streamify? <a href="{{ url_for('auth.register') }}" class="text-white hover:underline">Sign up now</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
